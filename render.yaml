services:
  - type: web
    name: ugp-pld-copilot-api
    env: docker
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ugp-pld-copilot-db
          property: connectionString
      - key: API_RATE_LIMIT
        value: "20"
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-domain.vercel.app,http://localhost:3000
      - key: CHROMA_COLLECTION_NAME
        value: pvd_docs
      - key: CHROMA_PERSIST_DIRECTORY
        value: /var/data/chroma_store
databases:
  - name: ugp-pld-copilot-db
    databaseName: ugp_pld_copilot
    user: ugp_pld_copilot
